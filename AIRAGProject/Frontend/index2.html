<!DOCTYPE html>
<html>
<head>
    <title>NextNexa ChatGPT (Ollama)</title>
    <style>
        :root {
            --bg: #050816;
            --bg-elevated: #0b1020;
            --border: #23263a;
            --accent: #3b82f6;
            --accent-soft: rgba(59,130,246,0.15);
            --text: #e5e7eb;
            --text-muted: #9ca3af;
            --user-bubble: #3b82f6;
            --bot-bubble: #111827;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 260px;
            background: #020617;
            border-right: 1px solid var(--border);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #sidebar h2 {
            font-size: 18px;
            margin: 0 0 8px 0;
        }

        #new-chat-btn {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #020617;
            color: var(--text);
            cursor: pointer;
            text-align: left;
            font-size: 14px;
        }

        #new-chat-btn:hover {
            border-color: var(--accent);
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 8px;
        }

        .history-item {
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 4px;
        }

        .history-item.active {
            background: var(--accent-soft);
            color: var(--text);
        }

        .history-item:hover {
            background: #020617;
        }

        /* Main area */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #header {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(2,6,23,0.9);
            backdrop-filter: blur(10px);
        }

        #header-title {
            font-size: 16px;
            font-weight: 500;
        }

        #header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        #voice-toggle {
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #020617;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
        }

        #voice-toggle.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .message-row {
            display: flex;
            margin-bottom: 14px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            white-space: pre-wrap;
            line-height: 1.5;
            font-size: 14px;
        }

        .user-row {
            justify-content: flex-end;
        }

        .bot-row {
            justify-content: flex-start;
        }

        .user-bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-bubble {
            background: var(--bot-bubble);
            color: var(--text);
            border: 1px solid #1f2937;
            border-bottom-left-radius: 4px;
        }

        #input-area {
            padding: 14px 18px;
            border-top: 1px solid var(--border);
            background: rgba(2,6,23,0.95);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #prompt {
            flex: 1;
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid #374151;
            background: #020617;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        #prompt:focus {
            border-color: var(--accent);
        }

        #mic-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #374151;
            background: #020617;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        #mic-btn.listening {
            border-color: #f97316;
            color: #f97316;
        }

        #send-btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        #send-btn:disabled {
            opacity: 0.6;
            cursor: default;
        }

        #model-label {
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div>
            <h2>NextNexa</h2>
            <button id="new-chat-btn">+ New chat</button>
        </div>
        <div id="history-list"></div>
    </div>

    <div id="main">
        <div id="header">
            <div id="header-title">NextNexa ChatGPT</div>
            <div id="header-right">
                <button id="voice-toggle">🔊 Voice on</button>
                <div id="model-label">Model: llama3.2:1b (local)</div>
            </div>
        </div>

        <div id="chat-container"></div>

        <div id="input-area">
            <input id="prompt" type="text" placeholder="Send a message..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button id="mic-btn" title="Click to speak">🎤</button>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById("chat-container");
        const historyList = document.getElementById("history-list");
        const promptInput = document.getElementById("prompt");
        const sendBtn = document.getElementById("send-btn");
        const newChatBtn = document.getElementById("new-chat-btn");
        const voiceToggleBtn = document.getElementById("voice-toggle");
        const micBtn = document.getElementById("mic-btn");

        let conversations = [];
        let currentConversationId = null;
        let isStreaming = false;
        let voiceEnabled = true;

        /* -------------------------
           TEXT‑TO‑SPEECH (AI SPEAKS)
        --------------------------*/
        function speak(text) {
            if (!voiceEnabled) return;
            if (!("speechSynthesis" in window)) return;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.lang = "en-US";
            window.speechSynthesis.speak(utterance);
        }

        voiceToggleBtn.onclick = () => {
            voiceEnabled = !voiceEnabled;
            voiceToggleBtn.textContent = voiceEnabled ? "🔊 Voice on" : "🔈 Voice off";
        };

        /* -------------------------
           SPEECH‑TO‑TEXT (MIC INPUT)
        --------------------------*/
        let recognition = null;
        let recognizing = false;

        if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.lang = "en-US";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                recognizing = true;
                micBtn.classList.add("listening");
            };

            recognition.onend = () => {
                recognizing = false;
                micBtn.classList.remove("listening");
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                promptInput.value = transcript;
                promptInput.focus();
            };
        } else {
            micBtn.disabled = true;
            micBtn.title = "Speech recognition not supported in this browser";
        }

        micBtn.onclick = () => {
            if (!recognition) return;
            if (recognizing) recognition.stop();
            else recognition.start();
        };

        /* -------------------------
           CHAT + STREAMING LOGIC
        --------------------------*/
        function createConversation() {
            const id = Date.now().toString();
            const convo = { id, title: "New chat", messages: [] };
            conversations.unshift(convo);
            currentConversationId = id;
            renderHistory();
            renderMessages();
        }

        function getCurrentConversation() {
            return conversations.find(c => c.id === currentConversationId);
        }

        function renderHistory() {
            historyList.innerHTML = "";
            conversations.forEach(convo => {
                const item = document.createElement("div");
                item.classList.add("history-item");
                if (convo.id === currentConversationId) item.classList.add("active");
                item.innerText = convo.title;
                item.onclick = () => {
                    currentConversationId = convo.id;
                    renderHistory();
                    renderMessages();
                };
                historyList.appendChild(item);
            });
        }

        function renderMessages() {
            chatContainer.innerHTML = "";
            const convo = getCurrentConversation();
            if (!convo) return;
            convo.messages.forEach(msg => {
                addMessageElement(msg.text, msg.sender, false);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addMessageElement(text, sender, appendToConversation = true) {
            const row = document.createElement("div");
            row.classList.add("message-row", sender === "user" ? "user-row" : "bot-row");

            const bubble = document.createElement("div");
            bubble.classList.add("message", sender === "user" ? "user-bubble" : "bot-bubble");
            bubble.innerText = text;

            row.appendChild(bubble);
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            if (appendToConversation) {
                const convo = getCurrentConversation();
                if (convo) {
                    convo.messages.push({ sender, text });
                    if (convo.title === "New chat" && sender === "user") {
                        convo.title = text.slice(0, 30) + (text.length > 30 ? "..." : "");
                        renderHistory();
                    }
                }
            }

            return bubble;
        }

        async function sendMessage() {
            if (isStreaming) return;

            const prompt = promptInput.value.trim();
            if (!prompt) return;

            const convo = getCurrentConversation();
            if (!convo) createConversation();

            addMessageElement(prompt, "user");
            promptInput.value = "";

            const botBubble = addMessageElement("", "bot");
            isStreaming = true;
            sendBtn.disabled = true;

            try {
                const res = await fetch("http://127.0.0.1:8000/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });

                if (!res.ok || !res.body) {
                    botBubble.innerText = "Error: " + res.status;
                } else {
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let fullText = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value, { stream: true });
                        fullText += chunk;
                        botBubble.innerText = fullText;
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }

                    const convo = getCurrentConversation();
                    if (convo) {
                        convo.messages.push({ sender: "bot", text: fullText });
                    }

                    speak(fullText);
                }
            } catch (err) {
                botBubble.innerText = "Error connecting to backend";
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
            }
        }

        newChatBtn.onclick = () => {
            createConversation();
        };

        // initial chat
        createConversation();
    </script>

</body>
</html>
