<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 900px;
      height: 90vh;
      background: #1e293b;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    .chat-header {
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: white;
      background: #111827;
      border-bottom: 1px solid #334155;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.5;
      word-wrap: break-word;
      font-size: 15px;
    }

    .user-message {
      align-self: flex-end;
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 6px;
    }

    .ai-message {
      align-self: flex-start;
      background: #334155;
      color: white;
      border-bottom-left-radius: 6px;
    }

    .chat-input-area {
      display: flex;
      padding: 16px;
      background: #111827;
      border-top: 1px solid #334155;
      gap: 10px;
    }

    .chat-input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
      background: #1e293b;
      color: white;
    }

    .send-btn {
      padding: 14px 22px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .send-btn:hover {
      background: #1d4ed8;
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 600px) {
      .chat-container {
        height: 100vh;
        border-radius: 0;
      }

      .message {
        max-width: 90%;
      }

      .chat-input-area {
        flex-direction: column;
      }

      .send-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="chat-container">

    <div class="chat-header">
      AI Chat Assistant
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
      <input
        type="text"
        id="messageInput"
        class="chat-input"
        placeholder="Type your message..."
      />

      <button id="sendBtn" class="send-btn">
        Send
      </button>
    </div>

  </div>

  <script>
    const chatMessages = document.getElementById("chatMessages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, type) {
      const messageDiv = document.createElement("div");
      messageDiv.classList.add("message");

      if (type === "user") {
        messageDiv.classList.add("user-message");
      } else {
        messageDiv.classList.add("ai-message");
      }

      messageDiv.textContent = text;
      chatMessages.appendChild(messageDiv);

      // Auto scroll to latest message
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage() {
      const userMessage = messageInput.value.trim();

      if (!userMessage) return;

      // Add user message
      addMessage(userMessage, "user");

      // Clear input
      messageInput.value = "";

      // Disable button while loading
      sendBtn.disabled = true;

      try {
        const response = await fetch("http://127.0.0.1:8000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            prompt: userMessage
          })
        });

        if (!response.ok) {
          throw new Error("Server error");
        }

        const data = await response.json();

        // Change this depending on your backend response format
        const aiReply =
          data.response ||
          data.reply ||
          data.message ||
          "No response received.";

        addMessage(aiReply, "ai");

      } catch (error) {
        addMessage("Error: Unable to connect to AI server.", "ai");
        console.error(error);
      } finally {
        sendBtn.disabled = false;
      }
    }

    // Send button click
    sendBtn.addEventListener("click", sendMessage);

    // Enter key support
    messageInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
